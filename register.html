<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký — VIXXY D'ORANCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&family=Cormorant+Garamond:ital,wght@1,400;0,700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-split">
        <aside class="auth-visual">
            <img src="images/nen_dk-dn.png" alt="VIXXY D'ORANCE">
            <div class="auth-brand">
                <h1>VIXXY D'ORANCE</h1>
                <p>WOMEN'S FASHION</p>
            </div>
        </aside>

        <main class="auth-panel">
            <div class="auth-form-wrap">
                <div class="auth-welcome">
                    <p class="line1">Welcome to the</p>
                    <p class="line2">WORLD OF FASHION</p>
                </div>

                <form class="auth-form" action="login.html" method="get">
                    <div class="auth-field">
                        <input type="email" name="email" placeholder="Email" autocomplete="email" required>
                    </div>
                    <div class="auth-field">
                        <input type="text" name="username" placeholder="Tên đăng nhập" required>
                    </div>
                    <div class="auth-field">
                        <input type="password" name="password" placeholder="Mật khẩu" required>
                    </div>
                    <div class="auth-field">
                        <input type="password" name="confirm" placeholder="Xác nhận mật khẩu" required>
                    </div>
                    <button type="submit" class="auth-submit">ĐĂNG KÝ</button>
                </form>

                <p class="auth-footer">
                    <a href="login.html" class="auth-back">← Quay lại đăng nhập</a>
                </p>
                <a href="index.html" class="auth-back">← Về trang chủ</a>
            </div>
        </main>
    </div>
</body>
</html>
